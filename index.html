<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>그리움 — 어르신의 하루를 가족에게</title>
<meta name="description" content="주간보호센터 어르신이 만든 작품을 가족에게 남기는 서비스 — 5분 설문">

<style>
  :root{
    --ground:#F4F5F3; --surface:#FFFFFF; --surface-2:#EAECE9;
    --ink:#1C201F; --ink-2:#454C49; --muted:#6E7672; --line:#D5D9D5;
    --accent:#2F4E63; --accent-soft:#E4EBF0;
    --crayon:#B0801E; --crayon-soft:#F5EDD9;
    --alert:#8C3A2E; --alert-soft:#F7E9E6;
    --shadow:0 1px 2px rgba(28,32,31,.06), 0 8px 24px rgba(28,32,31,.06);
    --display:Batang,"Nanum Myeongjo",BatangChe,"Apple SD Gothic Neo",serif;
    --body:"Malgun Gothic","Apple SD Gothic Neo",system-ui,-apple-system,"Segoe UI",sans-serif;
    --s2:.875rem; --s3:1.25rem; --s4:2rem; --s5:3rem;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --ground:#151918; --surface:#1D2322; --surface-2:#252C2A;
      --ink:#E8EBE9; --ink-2:#B6BDBA; --muted:#8A928E; --line:#333B39;
      --accent:#8FB6CE; --accent-soft:#1E2C36; --crayon:#D9AE4E; --crayon-soft:#2C2617;
      --alert:#D98878; --alert-soft:#33211D;
      --shadow:0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.3);
    }
  }
  :root[data-theme="dark"]{
    --ground:#151918; --surface:#1D2322; --surface-2:#252C2A;
    --ink:#E8EBE9; --ink-2:#B6BDBA; --muted:#8A928E; --line:#333B39;
    --accent:#8FB6CE; --accent-soft:#1E2C36; --crayon:#D9AE4E; --crayon-soft:#2C2617;
    --alert:#D98878; --alert-soft:#33211D;
  }
  :root[data-theme="light"]{
    --ground:#F4F5F3; --surface:#FFFFFF; --surface-2:#EAECE9;
    --ink:#1C201F; --ink-2:#454C49; --muted:#6E7672; --line:#D5D9D5;
    --accent:#2F4E63; --accent-soft:#E4EBF0; --crayon:#B0801E; --crayon-soft:#F5EDD9;
    --alert:#8C3A2E; --alert-soft:#F7E9E6;
  }

  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--ground); color:var(--ink);
    font-family:var(--body); font-size:16px; line-height:1.7; -webkit-font-smoothing:antialiased;
    padding-bottom:5.5rem}
  .wrap{max-width:1080px; margin:0 auto; padding:var(--s3) var(--s3) var(--s4)}

  .bar{position:sticky; top:0; z-index:20; background:var(--ground); padding-top:.6rem}
  .bar .track{height:4px; background:var(--surface-2); border-radius:2px; overflow:hidden}
  .bar .fill{height:100%; background:var(--accent); width:0; transition:width .3s}
  .bar .lbl{font-size:.72rem; color:var(--muted); letter-spacing:.08em; margin-top:.4rem}

  .top{display:flex; flex-wrap:wrap; align-items:baseline; gap:.5rem var(--s3); margin:var(--s3) 0}
  .brand{font-family:var(--display); font-size:1.6rem; letter-spacing:.06em; margin:0}
  .brand small{display:block; font-family:var(--body); font-size:.72rem; letter-spacing:.12em;
    color:var(--muted); font-weight:600; margin-top:.2rem}

  .card{background:var(--surface); border:1px solid var(--line); border-radius:4px;
    box-shadow:var(--shadow); padding:var(--s4) var(--s3)}
  @media (min-width:720px){ .card{padding:var(--s5) var(--s4)} }

  .eyebrow{font-size:.72rem; letter-spacing:.16em; font-weight:700; color:var(--accent); margin:0 0 .5rem}
  h2{font-family:var(--display); font-size:1.7rem; line-height:1.35; margin:0 0 var(--s2);
    text-wrap:balance; letter-spacing:.01em}
  @media (min-width:720px){ h2{font-size:2rem} }
  .lede{font-size:1.02rem; color:var(--ink-2); max-width:62ch; margin:0 0 var(--s3)}
  .who{display:inline-block; font-size:.75rem; font-weight:700; letter-spacing:.08em;
    background:var(--surface-2); color:var(--ink-2); padding:.25rem .6rem; border-radius:2px; margin-bottom:var(--s3)}

  .q{border-top:1px solid var(--line); padding:var(--s3) 0}
  .q.first{border-top:0; padding-top:0}
  .q .t{font-weight:700; font-size:1.05rem; line-height:1.5; margin-bottom:.35rem}
  .q .t .st{color:var(--crayon)}
  .q .h{font-size:.85rem; color:var(--muted); margin-bottom:.7rem; line-height:1.5}
  .opts{display:flex; flex-direction:column; gap:.45rem}
  .opt{display:flex; align-items:flex-start; gap:.6rem; cursor:pointer;
    border:1px solid var(--line); background:var(--surface); border-radius:4px;
    padding:.7rem .85rem; font-size:.97rem; line-height:1.45; transition:.12s}
  .opt:hover{border-color:var(--accent)}
  .opt.on{background:var(--accent-soft); border-color:var(--accent); font-weight:700}
  .opt .mk{flex:none; width:1.1rem; height:1.1rem; margin-top:.2rem; border:1.5px solid var(--line);
    border-radius:50%; display:grid; place-items:center}
  .opt.multi .mk{border-radius:3px}
  .opt.on .mk{border-color:var(--accent); background:var(--accent)}
  .opt.on .mk::after{content:""; width:.4rem; height:.4rem; background:#fff; border-radius:50%}
  .q input[type=text], .q textarea{width:100%; font:inherit; font-size:.97rem;
    padding:.7rem .8rem; border:1px solid var(--line); border-radius:4px;
    background:var(--ground); color:var(--ink); resize:vertical}
  .q textarea{min-height:5.5rem}
  .q input:focus, .q textarea:focus{border-color:var(--accent); outline:none}
  .skip{font-size:.82rem; color:var(--muted); margin-top:var(--s3)}

  .foot{position:fixed; left:0; right:0; bottom:0; z-index:30;
    background:var(--surface); border-top:1px solid var(--line); padding:.7rem var(--s3);
    box-shadow:0 -4px 16px rgba(0,0,0,.06)}
  .foot .in{max-width:1080px; margin:0 auto; display:flex; gap:.5rem; align-items:center}
  .btn{flex:1; font:inherit; font-size:.98rem; font-weight:700; cursor:pointer;
    padding:.85rem .5rem; border:1px solid var(--accent); border-radius:4px;
    background:var(--accent); color:#fff; transition:.12s}
  .btn:hover:not(:disabled){opacity:.9}
  .btn.ghost{background:var(--surface); color:var(--ink-2); border-color:var(--line); flex:0 1 auto; padding:.85rem .9rem}
  .btn:disabled{opacity:.35; cursor:not-allowed}

  .persp{display:flex; gap:.4rem; margin-bottom:var(--s2); flex-wrap:wrap}
  .persp button{flex:1; min-width:150px; font:inherit; font-size:.86rem; cursor:pointer;
    border:1px solid var(--line); background:var(--surface); color:var(--ink-2);
    border-radius:4px; padding:.6rem .8rem; text-align:left; line-height:1.4; transition:.12s}
  .persp button:hover{border-color:var(--accent)}
  .persp button[aria-pressed="true"]{background:var(--accent); border-color:var(--accent); color:#fff}
  .persp b{display:block; font-size:.94rem}
  .persp span{font-size:.74rem; opacity:.85}

  .rail{display:flex; gap:.35rem; flex-wrap:wrap; margin-bottom:var(--s3)}
  .rail button{font:inherit; font-size:.78rem; cursor:pointer; border:1px solid var(--line);
    background:var(--surface); color:var(--muted); border-radius:3px; padding:.38rem .65rem; transition:.12s}
  .rail button:hover{border-color:var(--accent); color:var(--ink)}
  .rail button[aria-current="true"]{background:var(--accent); border-color:var(--accent); color:#fff; font-weight:700}

  .stage{background:var(--ground); border:1px dashed var(--line); border-radius:4px;
    padding:var(--s3); margin:var(--s3) 0}
  .stage-label{font-size:.7rem; letter-spacing:.14em; font-weight:700; color:var(--muted); margin-bottom:var(--s2)}

  .io{display:grid; gap:var(--s2); margin-top:var(--s3); font-size:.88rem}
  @media (min-width:640px){ .io{grid-template-columns:1fr 1fr} }
  .io div{border-left:2px solid var(--line); padding-left:.75rem}
  .io b{display:block; font-size:.7rem; letter-spacing:.12em; color:var(--muted); font-weight:700}

  .flag{display:flex; gap:.6rem; align-items:flex-start; margin-top:var(--s3);
    padding:.75rem .9rem; border-radius:4px; font-size:.88rem; line-height:1.6}
  .flag.branch{background:var(--crayon-soft); border:1px solid var(--crayon)}
  .flag.unknown{background:var(--accent-soft); border:1px solid var(--accent)}
  .flag.safe{background:var(--alert-soft); border:1px solid var(--alert)}
  .flag .k{font-weight:700; white-space:nowrap}
  .quote{margin:var(--s3) 0 0; padding:.7rem .9rem; border-left:3px solid var(--muted);
    background:var(--surface-2); font-size:.88rem; color:var(--ink-2); line-height:1.6}
  .quote cite{display:block; font-style:normal; font-size:.76rem; color:var(--muted); margin-top:.4rem}

  .map{display:grid; gap:var(--s2); margin:var(--s3) 0}
  .track2{display:grid; grid-template-columns:auto 1fr; gap:var(--s3); align-items:center;
    border:1px solid var(--line); border-radius:4px; padding:var(--s2) var(--s3);
    background:var(--surface-2); opacity:.5}
  .track2.on{opacity:1; background:var(--accent-soft); border-color:var(--accent); border-width:2px}
  .track2 .n{font-family:var(--display); font-size:1.35rem; color:var(--accent)}
  .track2 .t{font-weight:700}
  .track2 .d{font-size:.85rem; color:var(--ink-2)}
  .track2 .tag{font-size:.7rem; letter-spacing:.1em; font-weight:700; color:var(--muted)}
  .merge{text-align:center; font-size:.83rem; color:var(--muted); letter-spacing:.1em; padding:.4rem 0}
  .aft{border:1px dashed var(--line); border-radius:4px; padding:var(--s2) var(--s3);
    text-align:center; color:var(--ink-2); opacity:.75}
  .aft b{font-family:var(--display); font-size:1.05rem; color:var(--ink)}

  .phone{max-width:340px; margin:0 auto; background:var(--surface); border:1px solid var(--line);
    border-radius:14px; padding:var(--s3); box-shadow:var(--shadow)}
  .phone h3{font-size:.94rem; margin:0 0 var(--s2); font-weight:700}
  .drop{border:2px dashed var(--line); border-radius:6px; padding:var(--s4) var(--s2);
    text-align:center; color:var(--muted); cursor:pointer; transition:.12s; font-size:.88rem}
  .drop:hover{border-color:var(--accent); color:var(--accent)}
  .drop input{display:none}
  .shot{width:100%; border-radius:4px; display:block; background:var(--surface-2)}
  .names{display:flex; flex-wrap:wrap; gap:.4rem; margin-top:var(--s2)}
  .names button{font:inherit; font-size:.88rem; cursor:pointer; padding:.45rem .8rem;
    border:1px solid var(--line); background:var(--surface); color:var(--ink); border-radius:20px; transition:.12s}
  .names button:hover{border-color:var(--accent)}
  .names button.sel{background:var(--accent); border-color:var(--accent); color:#fff; font-weight:700}
  .memo{width:100%; margin-top:var(--s2); font:inherit; font-size:.88rem; padding:.55rem .7rem;
    border:1px solid var(--line); border-radius:4px; background:var(--ground); color:var(--ink)}
  .save{width:100%; margin-top:var(--s2); font:inherit; font-weight:700; cursor:pointer;
    padding:.65rem; border:0; border-radius:4px; background:var(--accent); color:#fff}
  .save:disabled{opacity:.4; cursor:not-allowed}
  .save.warn{background:var(--alert)}
  .note{font-size:.78rem; color:var(--muted); margin-top:.5rem; text-align:center; line-height:1.5}

  .beforeafter{display:grid; gap:var(--s2); margin-top:var(--s2)}
  @media (min-width:520px){ .beforeafter{grid-template-columns:1fr 1fr} }
  .ba{border:1px solid var(--line); border-radius:4px; overflow:hidden; background:var(--surface)}
  .ba .h{font-size:.72rem; letter-spacing:.1em; font-weight:700; padding:.4rem .6rem;
    background:var(--surface-2); color:var(--muted)}
  .ba.out .h{background:var(--alert-soft); color:var(--alert)}
  .ba img{width:100%; display:block}

  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(115px,1fr)); gap:.55rem}
  .item{background:var(--surface); border:1px solid var(--line); border-radius:4px; overflow:hidden}
  .item img{width:100%; aspect-ratio:4/3; object-fit:cover; display:block; background:var(--surface-2)}
  .item .cap{padding:.45rem .55rem}
  .item .nm{font-size:.8rem; font-weight:700}
  .item .mm{font-size:.74rem; color:var(--muted)}
  .daylabel{font-family:var(--display); font-size:.93rem; color:var(--muted); margin:var(--s3) 0 .6rem;
    padding-bottom:.3rem; border-bottom:1px solid var(--line)}

  .msg{max-width:340px; margin:0 auto; background:var(--surface); border:1px solid var(--line);
    border-radius:10px; padding:var(--s3); box-shadow:var(--shadow); font-size:.88rem; line-height:1.65}
  .msg .from{font-size:.74rem; color:var(--muted); font-weight:700; margin-bottom:.5rem}
  .msg .link{display:block; margin-top:.7rem; padding:.55rem .7rem; background:var(--accent-soft);
    border:1px solid var(--accent); border-radius:4px; color:var(--accent); font-weight:700;
    font-size:.83rem; overflow-x:auto; white-space:nowrap}

  /* 설명 화면 */
  .ex{display:flex; gap:var(--s3); padding:var(--s4) 0; border-top:1px solid var(--line)}
  .ex:first-of-type{border-top:0; padding-top:var(--s2)}
  .ex .no{flex:none; width:2rem; height:2rem; border-radius:50%; background:var(--accent);
    color:#fff; font-weight:700; display:grid; place-items:center; font-size:.95rem; margin-top:.15rem}
  .ex .bd{flex:1; min-width:0}
  .ex h3{font-family:var(--display); font-size:1.25rem; margin:0 0 .4rem; line-height:1.4}
  .ex p{margin:0 0 var(--s2); color:var(--ink-2); font-size:.97rem}
  .ex .vis{margin-top:.6rem}
  .more{display:block; text-align:center; margin-top:var(--s4); padding:.8rem;
    border:1px dashed var(--line); border-radius:4px; color:var(--muted);
    text-decoration:none; font-size:.9rem}
  .more:hover{border-color:var(--accent); color:var(--accent)}
  .result{background:var(--surface-2); border:1px solid var(--line); border-radius:4px;
    padding:var(--s3); font-size:.83rem; line-height:1.6; white-space:pre-wrap;
    max-height:18rem; overflow-y:auto; font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .toast{position:fixed; left:50%; transform:translateX(-50%); bottom:6.5rem; z-index:40;
    background:var(--ink); color:var(--ground); padding:.7rem 1.1rem; border-radius:4px;
    font-size:.9rem; font-weight:700; opacity:0; pointer-events:none; transition:opacity .25s}
  .toast.on{opacity:1}

  :focus-visible{outline:2px solid var(--accent); outline-offset:2px}
  @media (prefers-reduced-motion:reduce){ *{transition:none !important} }
  footer{margin-top:var(--s4); font-size:.78rem; color:var(--muted); line-height:1.6}
</style>
</head>
<body>

<div class="wrap">
  <div class="bar" id="bar" hidden>
    <div class="track"><div class="fill" id="fill"></div></div>
    <div class="lbl" id="barlbl"></div>
  </div>

  <div class="top">
    <h1 class="brand">그리움<small id="sub">어르신의 하루를 가족에게</small></h1>
  </div>

  <main class="card" id="view" tabindex="-1"></main>
  <footer id="footnote"></footer>
</div>

<div class="foot"><div class="in" id="footin"></div></div>
<div class="toast" id="toast"></div>

<script src="survey.js"></script>
<script>
(function(){
  "use strict";
  var S = window.SURVEY, A = {};
  var view = document.getElementById("view");
  var footin = document.getElementById("footin");
  var bar = document.getElementById("bar"), fill = document.getElementById("fill");
  var barlbl = document.getElementById("barlbl"), subEl = document.getElementById("sub");
  var noteEl = document.getElementById("footnote"), toast = document.getElementById("toast");

  function el(t,c,h){ var n=document.createElement(t); if(c)n.className=c; if(h!=null)n.innerHTML=h; return n; }
  function esc(s){ return String(s).replace(/[&<>"]/g,function(m){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]; }); }

  /* ── 그림 자료 ── */
  function art(bg,draw,name){
    var band = name ? '<rect x="0" y="150" width="200" height="26" fill="#FFFDF5" stroke="#D8D2C2"/>'
      + '<text x="100" y="168" font-size="14" text-anchor="middle" fill="#5A5346" font-family="Batang, serif">'+name+'</text>' : '';
    var h = name ? 176 : 150;
    return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 '+h+'"><rect width="200" height="150" fill="'+bg+'"/>'+draw+band+'</svg>');
  }
  var DRAWS = [
    ['#F3EFE2','<circle cx="60" cy="52" r="22" fill="#E0A93B"/><path d="M20 120 Q70 70 120 120 T195 118" stroke="#7CA05A" stroke-width="9" fill="none" stroke-linecap="round"/><path d="M140 118 L140 78" stroke="#8A6A3E" stroke-width="7" stroke-linecap="round"/><circle cx="140" cy="70" r="16" fill="#C96A72"/>'],
    ['#EFF1EC','<path d="M30 118 L70 50 L110 118 Z" fill="#6E8FA8"/><path d="M95 118 L128 62 L162 118 Z" fill="#8FA9BD"/><circle cx="158" cy="38" r="14" fill="#E0A93B"/>'],
    ['#F1ECEF','<path d="M100 30 C130 30 145 60 128 82 L100 118 L72 82 C55 60 70 30 100 30Z" fill="#C96A72"/><path d="M100 118 L100 138" stroke="#7CA05A" stroke-width="6" stroke-linecap="round"/>']
  ];
  var WITH_NAME = DRAWS.map(function(d){ return art(d[0],d[1],"김순자"); });
  var CROPPED   = DRAWS.map(function(d){ return art(d[0],d[1],null); });
  var ROSTER = ["김순자","박영희","이말순","최금옥","정갑수","한복래"];
  var records = [
    {img:CROPPED[0],name:"김순자",memo:"봄꽃을 그리셨어요",day:"지난주 화요일"},
    {img:CROPPED[1],name:"김순자",memo:"산이라고 하셨습니다",day:"지난주 목요일"},
    {img:CROPPED[2],name:"김순자",memo:"",day:"어제"}
  ];
  var draft = {img:null,raw:null,name:null,memo:"",fixed:false};

  /* ── 단계 ── */
  var STEPS = ["intro","q0","group","explain","after","end","done"];
  var step = 0;
  function cur(){ return STEPS[step]; }
  function progress(){
    var shown = ["q0","group","explain","after","end"];
    var i = shown.indexOf(cur());
    if(i < 0){ bar.hidden = true; return; }
    bar.hidden = false;
    fill.style.width = Math.round((i+1)/shown.length*100)+"%";
    barlbl.textContent = (i+1)+" / "+shown.length;
  }

  /* ── 문항 ── */
  function renderQ(host,item,first){
    var box = el("div","q"+(first?" first":""));
    box.appendChild(el("div","t",(item.star?'<span class="st">★</span> ':"")+esc(item.q)));
    if(item.hint) box.appendChild(el("div","h",esc(item.hint)));
    if(item.text){
      var inp = item.long ? document.createElement("textarea") : document.createElement("input");
      if(!item.long) inp.type="text";
      inp.value = A[item.id]||"";
      inp.placeholder = "여기에 적어주세요 (안 쓰셔도 됩니다)";
      inp.addEventListener("input", function(e){ A[item.id]=e.target.value; });
      box.appendChild(inp);
    } else {
      var opts = el("div","opts");
      item.opts.forEach(function(o){
        var label = Array.isArray(o)?o[0]:o;
        var b = el("div","opt"+(item.multi?" multi":""));
        b.setAttribute("role","button"); b.tabIndex=0;
        b.appendChild(el("span","mk"));
        b.appendChild(el("span",null,esc(label)));
        var on = item.multi ? (A[item.id]||[]).indexOf(label)>=0 : A[item.id]===label;
        if(on) b.classList.add("on");
        function pick(){
          if(item.multi){
            var arr = A[item.id]||[]; var i=arr.indexOf(label);
            if(i>=0) arr.splice(i,1); else arr.push(label);
            A[item.id]=arr;
          } else {
            A[item.id]=label;
            if(Array.isArray(o)) A._g=o[1];
          }
          render();
        }
        b.addEventListener("click",pick);
        b.addEventListener("keydown",function(e){ if(e.key==="Enter"||e.key===" "){e.preventDefault();pick();} });
        opts.appendChild(b);
      });
      box.appendChild(opts);
    }
    host.appendChild(box);
  }

  /* ── 스토리보드 ── */
  var PERSPS = [{id:"site",t:"현장 관점",s:"어르신 · 센터 직원 — 만들고, 남긴다"},
                {id:"family",t:"가족 관점",s:"자녀 — 받아보고, 이야기한다"}];
  var persp = "site", list = [], sidx = 0;

  var SCENES = [
    {p:"all",id:"map",tab:"전체 그림",eyebrow:"한눈에",title:"세 갈래가 하나로 모입니다",

  function rShoot(host){
    var p = el("div","phone"); p.appendChild(el("h3",null,"작품 남기기"));
    var box = el("div");
    if(draft.raw){
      var img=el("img","shot"); img.src=draft.raw; img.alt="찍은 작품"; box.appendChild(img);
      var again=el("button","save","다시 고르기"); again.type="button";
      again.addEventListener("click",function(){ draft.raw=null;draft.img=null;draft.fixed=false;render(); });
      box.appendChild(again);
    } else {
      var lab=el("label","drop","작품 사진을 고르세요<br><span style=\"font-size:.8rem\">폰이라면 여기서 바로 카메라가 열립니다</span>");
      var inp=document.createElement("input"); inp.type="file"; inp.accept="image/*";
      inp.addEventListener("change",function(e){
        var f=e.target.files&&e.target.files[0]; if(!f) return;
        var r=new FileReader(); r.onload=function(ev){ draft.raw=ev.target.result; draft.img=ev.target.result; render(); };
        r.readAsDataURL(f);
      });
      lab.appendChild(inp); box.appendChild(lab);
      var s=el("button","save","사진이 없으면 예시로 해보기"); s.type="button";
      s.addEventListener("click",function(){ draft.raw=WITH_NAME[0]; draft.img=CROPPED[0]; render(); });
      box.appendChild(s);
    }
    p.appendChild(box);
    p.appendChild(el("div","note","고른 사진은 이 브라우저 안에만 있습니다."));
    host.appendChild(p);
  }
  function rTag(host){
    var p=el("div","phone"); p.appendChild(el("h3",null,"누구 것인가요?"));
    if(draft.raw){ var img=el("img","shot"); img.src=draft.raw; img.alt="이름칸이 보이는 작품"; p.appendChild(img); }
    else p.appendChild(el("div","drop","앞 장면에서 사진을 먼저 골라 주세요"));
    var names=el("div","names");
    ROSTER.forEach(function(n){
      var b=el("button",null,n); b.type="button";
      if(draft.name===n) b.className="sel";
      b.addEventListener("click",function(){ draft.name=n; render(); });
      names.appendChild(b);
    });
    p.appendChild(names);
    p.appendChild(el("div","note","오늘 오신 분들입니다. 센터가 이미 갖고 있는 명단이라 따로 받을 필요가 없습니다."));

    memo.className="memo"; memo.type="text"; memo.placeholder="한 줄 남기기 (오늘 어떠셨는지)"; memo.value=draft.memo;
    memo.addEventListener("input",function(e){ draft.memo=e.target.value; });
    p.appendChild(memo);
    var ok=el("button","save","이 분이 맞습니다"); ok.type="button";
    ok.disabled = !(draft.raw && draft.name);

  function rGallery(host){
    var days={},order=[];
    records.forEach(function(r){ if(!days[r.day]){days[r.day]=[];order.push(r.day);} days[r.day].push(r); });
    order.slice().reverse().forEach(function(d){

  function buildList(){ list = SCENES.filter(function(s){ return s.p==="all"||s.p===persp; }); }
  function goScene(i){ sidx=Math.max(0,Math.min(list.length-1,i)); render(); window.scrollTo({top:0,behavior:"smooth"}); }

  function renderStory(host){
    var pb=el("div","persp");
    PERSPS.forEach(function(p){
      var b=document.createElement("button"); b.type="button";
      b.setAttribute("aria-pressed",persp===p.id?"true":"false");
      b.innerHTML="<b>"+p.t+"</b><span>"+p.s+"</span>";
      b.addEventListener("click",function(){
        if(persp===p.id) return;
        persp=p.id; buildList(); sidx=list.length>1?1:0; render(); window.scrollTo({top:0,behavior:"smooth"});
      });
      pb.appendChild(b);
    });
    host.appendChild(pb);
    var rail=el("div","rail");
    list.forEach(function(sc,i){
      var b=el("button",null,sc.tab); b.type="button";
      b.setAttribute("aria-current",i===sidx?"true":"false");
      b.addEventListener("click",function(){ goScene(i); });
      rail.appendChild(b);
    });
    host.appendChild(rail);

    var s=list[sidx];
    host.appendChild(el("p","eyebrow",s.eyebrow));
    host.appendChild(el("h2",null,s.title));
    if(s.who) host.appendChild(el("div","who",s.who));
    host.appendChild(el("p","lede",s.lede));
    if(s.art){
      var st=el("div","stage"); st.appendChild(el("div","stage-label","그날의 결과물"));
      var g=el("div","grid");
      WITH_NAME.forEach(function(src,i){
        var it=el("div","item");
        var im=document.createElement("img"); im.src=src; im.alt="어르신이 그린 그림 예시 "+(i+1); it.appendChild(im);
        it.appendChild(el("div","cap","<div class=\"nm\">아래 칸에 이름을 적습니다</div>"));
        g.appendChild(it);
      });
      st.appendChild(g); host.appendChild(st);
    }
    if(s.render){
      var stage=el("div","stage");
      stage.appendChild(el("div","stage-label",s.id==="map"?"전체 그림":"화면"));
      s.render(stage); host.appendChild(stage);
    }
    if(s.io){
      var io=el("div","io");
      io.appendChild(el("div",null,"<b>들어오는 것</b>"+s.io[0]));
      io.appendChild(el("div",null,"<b>나가는 것</b>"+s.io[1]));
      host.appendChild(io);
    }
    if(s.safe)    host.appendChild(el("div","flag safe","<span class=\"k\">왜 지우나</span><span>"+s.safe+"</span>"));
    if(s.branch)  host.appendChild(el("div","flag branch","<span class=\"k\">갈림길</span><span>"+s.branch+"</span>"));
    if(s.unknown) host.appendChild(el("div","flag unknown","<span class=\"k\">아직 확인 못 함</span><span>"+s.unknown+"</span>"));
    if(s.quote)   host.appendChild(el("blockquote","quote","“"+s.quote[0]+"”<cite>"+s.quote[1]+"</cite>"));
  }

      "지금은 이 작품들이 벽에 붙었다가 <b>한 달쯤 뒤에 버려집니다.</b> 버리기 전에 한 장만 찍어두는 것이 전부입니다. 누구 것인지는 <b>명단에서 한 번 누르면</b> 됩니다.",
      function(v){
        var p = el("div","phone");
        p.appendChild(el("h3",null,"누구 것인가요?"));
        var im=document.createElement("img"); im.className="shot"; im.src=WITH_NAME[0]; im.alt="이름칸이 보이는 작품";
        p.appendChild(im);
        var names=el("div","names");
        ROSTER.slice(0,4).forEach(function(n,i){
          var b=el("button",null,n); b.type="button"; b.disabled=true;
          if(i===0) b.className="sel";
          names.appendChild(b);
        });
        p.appendChild(names);
        p.appendChild(el("div","note","타이핑은 하지 않습니다. 한 번 누르면 끝입니다."));
        v.appendChild(p);
      });

    exStep(host, 3, "이름칸은 자동으로 잘려나갑니다",
      "누구 것인지 확인이 끝나면, <b>사진에서 실명이 사라집니다.</b> 어르신 이름이 밖으로 나가지 않게 하기 위해서입니다.",
      function(v){
        var ba = el("div","beforeafter");
        var b1=el("div","ba"); b1.appendChild(el("div","h","찍은 그대로"));
        var i1=document.createElement("img"); i1.src=WITH_NAME[0]; i1.alt="이름칸이 있는 사진"; b1.appendChild(i1);
        var b2=el("div","ba out"); b2.appendChild(el("div","h","저장되는 것"));
        var i2=document.createElement("img"); i2.src=CROPPED[0]; i2.alt="이름칸이 잘려나간 사진"; b2.appendChild(i2);
        ba.appendChild(b1); ba.appendChild(b2);
        v.appendChild(ba);
      });

    exStep(host, 4, "가족은 늘 오던 문자에서 봅니다",
      "앱을 깔지 않습니다. 가입하지 않습니다. 센터가 <b>지금도 보내고 있는 공지</b>에 주소 한 줄만 붙습니다.",
      function(v){
        var m=el("div","msg");
        m.appendChild(el("div","from","햇살주간보호센터"));
        m.appendChild(el("div",null,"이번 주에는 <b>원예활동</b>과 <b>한지공예</b>를 진행했습니다.<br>다음 주에는 어버이날 행사가 예정되어 있습니다."));
        m.appendChild(el("div","link","🔗 김순자 어르신이 만드신 것 보기"));
        v.appendChild(m);
      });

    exStep(host, 5, "그렇게 쌓입니다",
      "한 장씩은 대수롭지 않습니다. 그런데 <b>모이면 어머니가 어떻게 지내셨는지가 보입니다.</b> 이게 저희가 만들려는 것입니다.",
      function(v){
        var g=el("div","grid");
        records.forEach(function(r){
          var it=el("div","item");
          var im=document.createElement("img"); im.src=r.img; im.alt=r.name+" 어르신의 작품"; it.appendChild(im);
          var cap=el("div","cap");
          cap.appendChild(el("div","nm",r.name));
          cap.appendChild(el("div","mm",r.memo||"—"));
          it.appendChild(cap); g.appendChild(it);
        });
        v.appendChild(g);
        v.appendChild(el("div","note","훗날 이것이 어머니를 기억하는 자리가 됩니다."));
      });

    exStep(host, 6, "그리고 어머니께도 보여드립니다",
      "이게 마지막이자 가장 중요한 장면입니다. <b>“어머니, 이거 지난주에 그리신 거예요.”</b> 기억이 안 나셔도 괜찮습니다. 날짜가 그날 거기 계셨다는 증거가 됩니다.",
      function(v){
        v.appendChild(el("blockquote","quote",
          "“어머 이거 내가 한 거예요? 잘 그렸네. 근데 나는 이거 그린 기억이 안 나요. 그래도 이렇게 날짜가 있으니까 “아 내가 그날 갔었구나” 하고 알겠네요. <b>손주한테 이거 좀 보여줘야겠다, 할미도 뭐 한다고.</b>”" +
          "<cite>가상 인터뷰 · 77세 어르신 (시뮬레이션)</cite>"));
        v.appendChild(el("div","flag branch",
          "<span class=\"k\">약속</span><span>어르신이 <b>원하지 않으시면 담지 않습니다.</b> 마음에 안 드시는 것은 언제든 빼실 수 있고, 무엇이 올라갔는지 <b>어르신도 보실 수 있게</b> 만들 생각입니다.</span>"));
      });

    var a = document.createElement("a");
    a.className = "more"; a.href = "story.html"; a.target = "_blank"; a.rel = "noopener";
    a.textContent = "더 자세한 화면이 궁금하시면 여기를 눌러주세요 (선택 · 새 창)";
    host.appendChild(a);
  }

  /* ── 답변 정리 ── */
  function summarize(){
    var L=["[그리움 설문 응답]"];
    var g=A._g||"?";
    L.push("분류: "+(S.groups[g]?S.groups[g].label:"미선택"),"");
    function dump(items){
      items.forEach(function(it){
        var v=A[it.id]; if(Array.isArray(v)) v=v.join(", ");
        L.push(it.id+". "+it.q);
        L.push("  → "+(v&&String(v).trim()?v:"(무응답)"));
      });
    }
    if(S[g]) dump(S[g]);
    L.push("","--- 화면을 본 뒤 ---");
    dump(S.after);
    L.push("");
    dump(S.end);
    return L.join("\n");
  }
  function copyText(t){
    if(navigator.clipboard && navigator.clipboard.writeText) return navigator.clipboard.writeText(t);
    return new Promise(function(res,rej){
      var ta=document.createElement("textarea"); ta.value=t;
      ta.style.position="fixed"; ta.style.opacity="0";
      document.body.appendChild(ta); ta.select();
      try{ document.execCommand("copy"); res(); }catch(e){ rej(e); }
      document.body.removeChild(ta);
    });
  }
  function showToast(m){ toast.textContent=m; toast.classList.add("on");
    setTimeout(function(){ toast.classList.remove("on"); },2200); }

  /* ── 버튼 ── */
  function foot(btns){
    footin.innerHTML="";
    btns.forEach(function(b){
      var n=document.createElement("button"); n.type="button";
      n.className="btn"+(b.ghost?" ghost":"");
      n.textContent=b.label;
      if(b.off) n.disabled=true; else n.addEventListener("click",b.fn);
      footin.appendChild(n);
    });
  }
  function next(){ if(step<STEPS.length-1){ step++; render(); window.scrollTo({top:0,behavior:"smooth"}); } }
  function prev(){ if(step>0){ step--; render(); window.scrollTo({top:0,behavior:"smooth"}); } }

  /* ── 화면 ── */
  function render(){
    var c=cur();
    view.innerHTML=""; noteEl.innerHTML=""; progress();
    subEl.textContent = "어르신의 하루를 가족에게";

    if(c==="intro"){
      view.appendChild(el("p","eyebrow","5분 설문"));
      view.appendChild(el("h2",null,"어르신이 남기신 것을 가족에게 전하는 서비스를 준비하고 있습니다"));
      view.appendChild(el("p","lede","주간보호센터에서 어르신들이 그림도 그리고 공예도 하십니다. 그게 벽에 한 달 붙어 있다가 그냥 버려집니다. 가족은 그런 게 있었는지도 모르고요."));
      view.appendChild(el("blockquote","quote","“아까분데 우짜노, 둘 데가 없다 안 카나. 자기 자석들이 안 가지러 오는데 우리가 우째.”<cite>가상 인터뷰 · 농촌 요양보호사 (시뮬레이션)</cite>"));
      view.appendChild(el("p","lede","<b>잘 모르셔도 괜찮습니다.</b> 전문 지식은 하나도 필요 없어요. 여쭤보는 건 전부 <b>본인 상황</b>이고, “모르겠다”도 저희에겐 소중한 답입니다."));
      view.appendChild(el("div","flag branch","<span class=\"k\">순서</span><span>먼저 몇 가지 여쭙고 → <b>준비 중인 화면을 보여드리고</b> → 소감을 여쭙습니다.</span>"));
      view.appendChild(el("div","skip","모든 질문은 건너뛰실 수 있습니다. 답은 이 브라우저 안에만 있고, 마지막에 직접 복사해서 보내주시는 방식입니다. 자동으로 전송되지 않습니다."));
      foot([{label:"시작하기",fn:next}]);
      return;
    }

    if(c==="q0"){
      view.appendChild(el("p","eyebrow","먼저"));
      view.appendChild(el("h2",null,"어느 쪽이신가요?"));
      view.appendChild(el("p","lede","이 답에 따라 여쭤볼 내용이 달라집니다."));
      renderQ(view,S.q0,true);
      foot([{label:"이전",fn:prev,ghost:true},{label:"다음",fn:next,off:!A._g}]);
      return;
    }

    if(c==="group"){
      var g=A._g||"D", meta=S.groups[g];
      view.appendChild(el("p","eyebrow",meta.label));
      view.appendChild(el("h2",null,meta.title));
      if(meta.desc) view.appendChild(el("p","lede",meta.desc));
      (S[g]||[]).forEach(function(it,i){ renderQ(view,it,i===0); });
      view.appendChild(el("div","skip","답하기 어려운 건 비워두셔도 됩니다."));
      foot([{label:"이전",fn:prev,ghost:true},{label:"다음",fn:next}]);
      return;
    }

    if(c==="explain"){
      view.appendChild(el("p","eyebrow","이런 서비스입니다"));
      view.appendChild(el("h2",null,"만드신 것이 그냥 버려지지 않게"));
      view.appendChild(el("p","lede","여섯 장면입니다. <b>아무것도 누르지 않으셔도 됩니다.</b> 쭉 내려서 보시고 다음으로 가시면 됩니다."));
      renderExplain(view);
      foot([{label:"이전",fn:prev,ghost:true},{label:"다 봤습니다",fn:next}]);
      return;
    }

    if(c==="after"){
      view.appendChild(el("p","eyebrow","보시고 나서"));
      view.appendChild(el("h2",null,"네 가지만 여쭙겠습니다"));
      view.appendChild(el("p","lede","솔직하게 적어주실수록 도움이 됩니다. <b>“별로다”가 가장 값진 답입니다.</b>"));
      S.after.forEach(function(it,i){ renderQ(view,it,i===0); });
      foot([{label:"이전",fn:prev,ghost:true},{label:"다음",fn:next}]);
      return;
    }

    if(c==="end"){
      view.appendChild(el("p","eyebrow","마지막"));
      view.appendChild(el("h2",null,"한 가지만 더 부탁드립니다"));
      view.appendChild(el("p","lede","현장에서 일하시는 분의 이야기를 꼭 듣고 싶습니다. <b>딱 15분</b>이면 됩니다."));
      S.end.forEach(function(it,i){ renderQ(view,it,i===0); });
      foot([{label:"이전",fn:prev,ghost:true},{label:"답변 정리하기",fn:next}]);
      return;
    }

    if(c==="done"){
      bar.hidden=true;
      view.appendChild(el("p","eyebrow","다 됐습니다"));
      view.appendChild(el("h2",null,"고맙습니다. 정말 큰 도움이 됐습니다"));
      view.appendChild(el("p","lede","아래 <b>[답변 복사하기]</b>를 누르시고, <b>보내주신 분께 붙여넣기</b>만 해주시면 끝입니다."));
      var txt=summarize();
      view.appendChild(el("div","result",esc(txt)));
      view.appendChild(el("div","skip","자동으로 전송되지 않습니다. 복사해서 직접 보내주셔야 합니다. 복사가 안 되면 위 내용을 길게 눌러 직접 선택해 주세요."));
      foot([{label:"처음부터",fn:function(){ A={}; step=0; persp="site"; buildList(); sidx=0; render(); },ghost:true},
            {label:"답변 복사하기",fn:function(){
              copyText(txt).then(function(){ showToast("복사되었습니다 — 붙여넣어 주세요"); },
                                 function(){ showToast("복사 실패 — 위 내용을 직접 선택해 주세요"); });
            }}]);
      return;
    }
  }

  buildList();
  render();
})();
</script>
