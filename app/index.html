<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>그리움 — 작품 남기기</title>
<meta name="description" content="주간보호센터 어르신의 작품을 남겨 가족에게 전합니다">
<meta name="theme-color" content="#2F4E63">

<style>
  :root{
    --ground:#F4F5F3; --surface:#FFFFFF; --surface-2:#EAECE9;
    --ink:#1C201F; --ink-2:#454C49; --muted:#6E7672; --line:#D5D9D5;
    --accent:#2F4E63; --accent-soft:#E4EBF0;
    --crayon:#B0801E; --crayon-soft:#F5EDD9;
    --alert:#8C3A2E; --alert-soft:#F7E9E6;
    --ok:#3D6B4A; --ok-soft:#E3EFE6;
    --shadow:0 1px 2px rgba(28,32,31,.06), 0 8px 24px rgba(28,32,31,.06);
    --display:Batang,"Nanum Myeongjo",BatangChe,"Apple SD Gothic Neo",serif;
    --body:"Malgun Gothic","Apple SD Gothic Neo",system-ui,-apple-system,"Segoe UI",sans-serif;
    --s1:.5rem; --s2:.875rem; --s3:1.25rem; --s4:2rem;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --ground:#151918; --surface:#1D2322; --surface-2:#252C2A;
      --ink:#E8EBE9; --ink-2:#B6BDBA; --muted:#8A928E; --line:#333B39;
      --accent:#8FB6CE; --accent-soft:#1E2C36; --crayon:#D9AE4E; --crayon-soft:#2C2617;
      --alert:#D98878; --alert-soft:#33211D; --ok:#8FBF9E; --ok-soft:#1C2A20;
      --shadow:0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.3);
    }
  }
  :root[data-theme="dark"]{
    --ground:#151918; --surface:#1D2322; --surface-2:#252C2A;
    --ink:#E8EBE9; --ink-2:#B6BDBA; --muted:#8A928E; --line:#333B39;
    --accent:#8FB6CE; --accent-soft:#1E2C36; --crayon:#D9AE4E; --crayon-soft:#2C2617;
    --alert:#D98878; --alert-soft:#33211D; --ok:#8FBF9E; --ok-soft:#1C2A20;
  }
  :root[data-theme="light"]{
    --ground:#F4F5F3; --surface:#FFFFFF; --surface-2:#EAECE9;
    --ink:#1C201F; --ink-2:#454C49; --muted:#6E7672; --line:#D5D9D5;
    --accent:#2F4E63; --accent-soft:#E4EBF0; --crayon:#B0801E; --crayon-soft:#F5EDD9;
    --alert:#8C3A2E; --alert-soft:#F7E9E6; --ok:#3D6B4A; --ok-soft:#E3EFE6;
  }

  *{box-sizing:border-box}
  html,body{margin:0; height:100%}
  body{
    background:var(--ground); color:var(--ink);
    font-family:var(--body); font-size:16px; line-height:1.65;
    -webkit-font-smoothing:antialiased;
    /* 하단 고정 버튼에 가리지 않게. 실제 높이는 JS 가 다시 잰다 */
    padding-bottom:calc(7rem + env(safe-area-inset-bottom));
  }
  .wrap{max-width:720px; margin:0 auto; padding:var(--s3)}

  /* ── 큐 상단 바 ── */
  .qbar{display:flex; align-items:center; gap:.5rem; margin-bottom:var(--s2)}
  .qbar .sp{margin-left:auto}
  .tbtn{font:inherit; font-size:.85rem; font-weight:700; cursor:pointer;
    border:1px solid var(--line); background:var(--surface); color:var(--ink-2);
    border-radius:999px; padding:.4rem .8rem; transition:.12s; display:inline-flex;
    align-items:center; gap:.3rem}
  .tbtn:hover{border-color:var(--accent); color:var(--accent)}
  .tbtn.add{border-color:var(--accent); color:var(--accent); background:var(--accent-soft)}
  .tbtn input{display:none}

  /* ── 머리 ── */
  .head{display:flex; align-items:center; gap:var(--s2); padding:var(--s2) 0 var(--s3)}
  .head .ttl{font-family:var(--display); font-size:1.3rem; letter-spacing:.05em; margin:0}
  .head .sub{font-size:.72rem; color:var(--muted); letter-spacing:.1em; margin-top:.1rem}
  .head .sp{margin-left:auto}
  .chip{font-size:.72rem; font-weight:700; letter-spacing:.06em; padding:.3rem .6rem;
    border-radius:999px; background:var(--surface-2); color:var(--ink-2); border:1px solid var(--line)}

  /* ── 카드 ── */
  .card{background:var(--surface); border:1px solid var(--line); border-radius:6px;
    box-shadow:var(--shadow); padding:var(--s3)}
  .card + .card{margin-top:var(--s2)}

  h2{font-family:var(--display); font-size:1.35rem; line-height:1.35; margin:0 0 .5rem}
  .lede{color:var(--ink-2); font-size:.95rem; margin:0 0 var(--s3)}
  .eyebrow{font-size:.7rem; letter-spacing:.16em; font-weight:700; color:var(--accent); margin:0 0 .4rem}

  /* ── 사진 받는 곳 ── */
  .drop{
    border:2px dashed var(--line); border-radius:8px; background:var(--surface);
    padding:var(--s4) var(--s3); text-align:center; cursor:pointer; transition:.15s;
  }
  .drop:hover,.drop:focus-within{border-color:var(--accent); background:var(--accent-soft)}
  .drop.over{border-color:var(--accent); background:var(--accent-soft); transform:scale(1.01)}
  .drop .big{font-size:1.05rem; font-weight:700; margin-bottom:.3rem}
  .drop .sm{font-size:.85rem; color:var(--muted); line-height:1.5}
  .drop input{display:none}

  .ways{display:grid; gap:.5rem; margin-top:var(--s2)}
  @media (min-width:480px){ .ways{grid-template-columns:1fr 1fr} }
  .way{display:flex; align-items:center; gap:.6rem; cursor:pointer;
    border:1px solid var(--line); background:var(--surface); border-radius:6px;
    padding:.75rem .9rem; font-size:.95rem; font-weight:700; transition:.12s; text-align:left}
  .way:hover{border-color:var(--accent); color:var(--accent)}
  .way .ic{font-size:1.2rem; flex:none}
  .way .d{font-size:.78rem; font-weight:400; color:var(--muted); display:block; margin-top:.1rem}
  .way input{display:none}

  /* ── 진행 ── */
  .prog{display:flex; align-items:center; gap:var(--s2); margin-bottom:var(--s3)}
  .prog .track{flex:1; height:5px; background:var(--surface-2); border-radius:3px; overflow:hidden}
  .prog .fill{height:100%; background:var(--accent); width:0; transition:width .25s}
  .prog .n{font-size:.8rem; font-weight:700; color:var(--muted); white-space:nowrap;
    font-variant-numeric:tabular-nums}

  /* ── 사진 미리보기 ── */
  .shot{width:100%; border-radius:6px; display:block; background:var(--surface-2)}
  .shotwrap{position:relative; background:var(--surface-2); border-radius:6px; overflow:hidden}
  .meta{display:flex; flex-wrap:wrap; gap:.4rem; margin-top:.6rem}
  .meta span{font-size:.74rem; color:var(--muted); background:var(--surface-2);
    border-radius:999px; padding:.2rem .55rem; font-variant-numeric:tabular-nums}

  /* ── 대기 목록 ── */
  .queue{display:flex; gap:.45rem; overflow-x:auto; padding:.3rem 0 .6rem; margin-top:var(--s2);
    -webkit-overflow-scrolling:touch}
  .queue .q{flex:none; width:56px; height:56px; border-radius:6px; overflow:hidden;
    border:2px solid var(--line); background:var(--surface-2); position:relative;
    cursor:pointer; padding:0; transition:.12s}
  .queue .q:hover{border-color:var(--accent)}
  .queue .q.now{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
  .queue .q.done{opacity:.5}
  .queue .q img{width:100%; height:100%; object-fit:cover; display:block; pointer-events:none}
  .queue .q .no{position:absolute; left:0; top:0; font-size:.62rem; font-weight:700;
    background:rgba(0,0,0,.55); color:#fff; padding:.05rem .28rem; border-bottom-right-radius:4px;
    font-variant-numeric:tabular-nums}
  .queue .q .mk{position:absolute; right:2px; bottom:1px; font-size:.7rem; color:#fff;
    text-shadow:0 0 3px rgba(0,0,0,.8)}
  .queuehint{font-size:.76rem; color:var(--muted); margin-top:-.2rem}

  /* ── 버튼 ── */
  .foot{position:fixed; left:0; right:0; bottom:0; z-index:30; background:var(--surface);
    border-top:1px solid var(--line); box-shadow:0 -4px 16px rgba(0,0,0,.06);
    padding:.7rem var(--s3) calc(.7rem + env(safe-area-inset-bottom))}
  .foot .in{max-width:720px; margin:0 auto; display:flex; gap:.5rem}
  .btn{flex:1; font:inherit; font-size:1rem; font-weight:700; cursor:pointer;
    padding:.9rem .5rem; border:1px solid var(--accent); border-radius:6px;
    background:var(--accent); color:#fff; transition:.12s}
  .btn:hover:not(:disabled){opacity:.9}
  .btn.ghost{background:var(--surface); color:var(--ink-2); border-color:var(--line); flex:0 1 auto; padding:.9rem 1rem}
  .btn.warn{background:var(--alert); border-color:var(--alert)}
  .btn:disabled{opacity:.35; cursor:not-allowed}

  /* ── 알림 ── */
  .note{font-size:.82rem; color:var(--muted); margin-top:.6rem; line-height:1.5}
  .msg{padding:.7rem .9rem; border-radius:6px; font-size:.9rem; line-height:1.55; margin-top:var(--s2)}
  .msg.info{background:var(--accent-soft); border:1px solid var(--accent)}
  .msg.warn{background:var(--alert-soft); border:1px solid var(--alert)}
  .msg.ok{background:var(--ok-soft); border:1px solid var(--ok)}
  .toast{position:fixed; left:50%; transform:translateX(-50%); bottom:6rem; z-index:50;
    background:var(--ink); color:var(--ground); padding:.7rem 1.1rem; border-radius:6px;
    font-size:.9rem; font-weight:700; opacity:0; pointer-events:none; transition:opacity .25s}
  .toast.on{opacity:1}

  .empty{text-align:center; color:var(--muted); padding:var(--s4) var(--s3); font-size:.92rem}

  :focus-visible{outline:2px solid var(--accent); outline-offset:2px}
  @media (prefers-reduced-motion:reduce){ *{transition:none !important} }
</style>
</head>
<body>

<div class="wrap">
  <header class="head">
    <div>
      <h1 class="ttl">그리움</h1>
      <div class="sub">작품 남기기</div>
    </div>
    <div class="sp"></div>
    <span class="chip" id="chip">준비 중</span>
  </header>

  <main id="view" tabindex="-1"></main>
</div>

<div class="foot"><div class="in" id="foot"></div></div>
<div class="toast" id="toast"></div>

<script src="js/model.js"></script>
<script src="js/store.js"></script>
<script src="js/image.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
</body>
</html>
