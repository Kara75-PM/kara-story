<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>그리움 — 작품 남기기</title>
<meta name="description" content="주간보호센터 어르신의 작품을 남겨 가족에게 전합니다">
<meta name="theme-color" content="#2F4E63">

<style>
  :root{
    --ground:#F4F5F3; --surface:#FFFFFF; --surface-2:#EAECE9;
    --ink:#1C201F; --ink-2:#454C49; --muted:#6E7672; --line:#D5D9D5;
    --accent:#2F4E63; --accent-soft:#E4EBF0;
    --crayon:#B0801E; --crayon-soft:#F5EDD9;
    --alert:#8C3A2E; --alert-soft:#F7E9E6;
    --ok:#3D6B4A; --ok-soft:#E3EFE6;
    --shadow:0 1px 2px rgba(28,32,31,.06), 0 8px 24px rgba(28,32,31,.06);
    --display:Batang,"Nanum Myeongjo",BatangChe,"Apple SD Gothic Neo",serif;
    --body:"Malgun Gothic","Apple SD Gothic Neo",system-ui,-apple-system,"Segoe UI",sans-serif;
    --s1:.5rem; --s2:.875rem; --s3:1.25rem; --s4:2rem;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --ground:#151918; --surface:#1D2322; --surface-2:#252C2A;
      --ink:#E8EBE9; --ink-2:#B6BDBA; --muted:#8A928E; --line:#333B39;
      --accent:#8FB6CE; --accent-soft:#1E2C36; --crayon:#D9AE4E; --crayon-soft:#2C2617;
      --alert:#D98878; --alert-soft:#33211D; --ok:#8FBF9E; --ok-soft:#1C2A20;
      --shadow:0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.3);
    }
  }
  :root[data-theme="dark"]{
    --ground:#151918; --surface:#1D2322; --surface-2:#252C2A;
    --ink:#E8EBE9; --ink-2:#B6BDBA; --muted:#8A928E; --line:#333B39;
    --accent:#8FB6CE; --accent-soft:#1E2C36; --crayon:#D9AE4E; --crayon-soft:#2C2617;
    --alert:#D98878; --alert-soft:#33211D; --ok:#8FBF9E; --ok-soft:#1C2A20;
  }
  :root[data-theme="light"]{
    --ground:#F4F5F3; --surface:#FFFFFF; --surface-2:#EAECE9;
    --ink:#1C201F; --ink-2:#454C49; --muted:#6E7672; --line:#D5D9D5;
    --accent:#2F4E63; --accent-soft:#E4EBF0; --crayon:#B0801E; --crayon-soft:#F5EDD9;
    --alert:#8C3A2E; --alert-soft:#F7E9E6; --ok:#3D6B4A; --ok-soft:#E3EFE6;
  }

  *{box-sizing:border-box}
  /* ⚠️ body 에 height:100% 를 주면 안 된다.
     본문 높이가 화면 크기로 고정되어, 넘치는 내용 아래에는 여백이 생기지 않는다.
     그러면 하단 고정 버튼이 마지막 내용을 덮는다. */
  html{height:100%}
  body{
    margin:0; min-height:100%;
    background:var(--ground); color:var(--ink);
    font-family:var(--body); font-size:16px; line-height:1.65;
    -webkit-font-smoothing:antialiased;
  }
  /* 하단 여백은 내용 상자에 준다 — 내용이 아무리 길어도 그 아래에 붙는다.
     실제 높이는 JS 가 다시 잰다. */
  .wrap{max-width:720px; margin:0 auto; padding:var(--s3);
    padding-bottom:calc(8rem + env(safe-area-inset-bottom))}

  /* ── 큐 상단 바 ── */
  .qbar{display:flex; align-items:center; gap:.5rem; margin-bottom:var(--s2)}
  .qbar .sp{margin-left:auto}
  .tbtn{font:inherit; font-size:.85rem; font-weight:700; cursor:pointer;
    border:1px solid var(--line); background:var(--surface); color:var(--ink-2);
    border-radius:999px; padding:.4rem .8rem; transition:.12s; display:inline-flex;
    align-items:center; gap:.3rem}
  .tbtn:hover{border-color:var(--accent); color:var(--accent)}
  .tbtn.add{border-color:var(--accent); color:var(--accent); background:var(--accent-soft)}
  .tbtn input{display:none}

  /* ── 머리 ── */
  .head{display:flex; align-items:center; gap:var(--s2); padding:var(--s2) 0 var(--s3)}
  .head .ttl{font-family:var(--display); font-size:1.3rem; letter-spacing:.05em; margin:0}
  .head .sub{font-size:.72rem; color:var(--muted); letter-spacing:.1em; margin-top:.1rem}
  .head .sp{margin-left:auto}
  .chip{font-size:.72rem; font-weight:700; letter-spacing:.06em; padding:.3rem .6rem;
    border-radius:999px; background:var(--surface-2); color:var(--ink-2); border:1px solid var(--line)}

  /* ── 카드 ── */
  .card{background:var(--surface); border:1px solid var(--line); border-radius:6px;
    box-shadow:var(--shadow); padding:var(--s3)}
  .card + .card{margin-top:var(--s2)}

  h2{font-family:var(--display); font-size:1.35rem; line-height:1.35; margin:0 0 .5rem}
  .lede{color:var(--ink-2); font-size:.95rem; margin:0 0 var(--s3)}
  .eyebrow{font-size:.7rem; letter-spacing:.16em; font-weight:700; color:var(--accent); margin:0 0 .4rem}

  /* ── 사진 받는 곳 ── */
  .drop{
    border:2px dashed var(--line); border-radius:8px; background:var(--surface);
    padding:var(--s4) var(--s3); text-align:center; cursor:pointer; transition:.15s;
  }
  .drop:hover,.drop:focus-within{border-color:var(--accent); background:var(--accent-soft)}
  .drop.over{border-color:var(--accent); background:var(--accent-soft); transform:scale(1.01)}
  .drop .big{font-size:1.05rem; font-weight:700; margin-bottom:.3rem}
  .drop .sm{font-size:.85rem; color:var(--muted); line-height:1.5}
  .drop input{display:none}

  .ways{display:grid; gap:.5rem; margin-top:var(--s2)}
  @media (min-width:480px){ .ways{grid-template-columns:1fr 1fr} }
  .way{display:flex; align-items:center; gap:.6rem; cursor:pointer;
    border:1px solid var(--line); background:var(--surface); border-radius:6px;
    padding:.75rem .9rem; font-size:.95rem; font-weight:700; transition:.12s; text-align:left}
  .way:hover{border-color:var(--accent); color:var(--accent)}
  .way .ic{font-size:1.2rem; flex:none}
  .way .d{font-size:.78rem; font-weight:400; color:var(--muted); display:block; margin-top:.1rem}
  .way input{display:none}

  /* ── 진행 ── */
  .prog{display:flex; align-items:center; gap:var(--s2); margin-bottom:var(--s3)}
  .prog .track{flex:1; height:5px; background:var(--surface-2); border-radius:3px; overflow:hidden}
  .prog .fill{height:100%; background:var(--accent); width:0; transition:width .25s}
  .prog .n{font-size:.8rem; font-weight:700; color:var(--muted); white-space:nowrap;
    font-variant-numeric:tabular-nums}

  /* ── 사진 미리보기 ── */
  .shot{width:100%; border-radius:6px; display:block; background:var(--surface-2)}
  .shotwrap{position:relative; background:var(--surface-2); border-radius:6px; overflow:hidden}
  .meta{display:flex; flex-wrap:wrap; gap:.4rem; margin-top:.6rem}
  .meta span{font-size:.74rem; color:var(--muted); background:var(--surface-2);
    border-radius:999px; padding:.2rem .55rem; font-variant-numeric:tabular-nums}

  /* ── 대기 목록 ── */
  .queue{display:flex; gap:.45rem; overflow-x:auto; padding:.3rem 0 .6rem; margin-top:var(--s2);
    -webkit-overflow-scrolling:touch}
  .queue .q{flex:none; width:56px; height:56px; border-radius:6px; overflow:hidden;
    border:2px solid var(--line); background:var(--surface-2); position:relative;
    cursor:pointer; padding:0; transition:.12s}
  .queue .q:hover{border-color:var(--accent)}
  .queue .q.now{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
  .queue .q.done{opacity:.5}
  .queue .q img{width:100%; height:100%; object-fit:cover; display:block; pointer-events:none}
  .queue .q .no{position:absolute; left:0; top:0; font-size:.62rem; font-weight:700;
    background:rgba(0,0,0,.55); color:#fff; padding:.05rem .28rem; border-bottom-right-radius:4px;
    font-variant-numeric:tabular-nums}
  .queue .q .mk{position:absolute; right:2px; bottom:1px; font-size:.7rem; color:#fff;
    text-shadow:0 0 3px rgba(0,0,0,.8)}
  .queuehint{font-size:.76rem; color:var(--muted); margin-top:-.2rem}

  /* ── 자를 자리 미리보기 ──
     틀 높이를 고정한다. 사진을 돌려도 화면이 출렁이지 않게. */
  /* 사진 위 줄 — 진행 표시와 「빼기」를 사진 바로 옆에 둔다.
     지울 대상 옆에 있어야 무엇을 지우는지 분명해진다. */
  .shotbar{display:flex; align-items:center; gap:.5rem; margin-bottom:.5rem}
  .shotbar .sp{margin-left:auto}
  .shotbar .cnt{font-size:.82rem; font-weight:700; color:var(--muted);
    font-variant-numeric:tabular-nums}

  /* 위·아래 여백 22px 은 0%·100% 자리의 손잡이가 틀 밖으로 잘리지 않게 하는 자리다.
     손잡이는 선을 중심으로 위아래 20px 씩 뻗는다. */
  .stage2{height:46vh; min-height:240px; max-height:420px; padding:22px 0;
    display:flex; align-items:center; justify-content:center;
    background:var(--surface-2); border-radius:6px; overflow:hidden}
  .fit{position:relative; display:inline-block; max-width:100%; max-height:100%; line-height:0}
  .fit img{display:block; max-width:100%; max-height:calc(46vh - 44px); width:auto; height:auto}
  @media (max-height:700px){ .fit img{max-height:calc(38vh - 44px)} }
  /* 잘려나갈 부분 — 위·아래 각각 */
  .fit .cut{position:absolute; left:0; right:0;
    background:repeating-linear-gradient(45deg, rgba(140,58,46,.34) 0 8px, rgba(140,58,46,.18) 8px 16px);
    pointer-events:none; display:flex; align-items:center; justify-content:center;
    overflow:hidden}
  .fit .cut.t{top:0}
  .fit .cut.b{bottom:0}
  .fit .cut span{font-size:.74rem; font-weight:700; color:#fff;
    text-shadow:0 1px 3px rgba(0,0,0,.85); padding:.1rem .5rem; line-height:1.25;
    white-space:nowrap}

  /* 끌 수 있는 자르기 선 — PC 에서는 이걸 끌고, 폰에서는 아래 슬라이더를 쓴다 */
  .fit .hnd{position:absolute; left:0; right:0; height:40px; z-index:2;
    cursor:ns-resize; touch-action:none; display:flex; align-items:center; justify-content:center;
    background:transparent}
  .fit .hnd.t{margin-top:-20px}
  .fit .hnd.b{margin-bottom:-20px}
  .fit .hnd::before{content:''; position:absolute; left:0; right:0; height:0;
    border-top:2px dashed #fff; filter:drop-shadow(0 0 2px rgba(0,0,0,.9))}
  .fit .hnd .grip{position:relative; min-width:52px; height:20px; border-radius:10px;
    background:#fff; box-shadow:0 1px 5px rgba(0,0,0,.5);
    display:flex; align-items:center; justify-content:center; gap:.2rem;
    font-size:.62rem; font-weight:700; color:#333; letter-spacing:.02em;
    font-variant-numeric:tabular-nums; padding:0 .4rem}
  .fit .hnd.drag .grip{background:var(--accent); color:#fff; transform:scale(1.08)}

  .cropctl{display:flex; align-items:center; gap:.5rem; margin-top:.7rem; flex-wrap:wrap}
  .cropctl .rots{display:flex; gap:.3rem}
  .croprow{display:flex; align-items:center; gap:.6rem; margin-top:.5rem}
  .croprow .k{font-size:.82rem; font-weight:700; color:var(--muted); min-width:2.4rem}
  .croprow input[type=range]{flex:1; min-width:100px; accent-color:var(--accent)}
  .croprow .v{font-size:.8rem; font-weight:700; color:var(--muted);
    font-variant-numeric:tabular-nums; min-width:2.6rem; text-align:right}
  .crophint{font-size:.78rem; color:var(--muted); margin-top:.5rem; line-height:1.5}
  .rotbtn{font:inherit; font-size:1rem; font-weight:700; cursor:pointer;
    border:1px solid var(--line); background:var(--surface); color:var(--ink-2);
    border-radius:6px; padding:.5rem .75rem; transition:.12s; white-space:nowrap; line-height:1}
  .rotbtn:hover{border-color:var(--accent); color:var(--accent)}

  /* ── 어르신 고르기 · 메모 ── */
  .sect{margin-top:var(--s3); padding-top:var(--s3); border-top:1px solid var(--line)}
  .sect > .lbl{font-size:.8rem; font-weight:700; letter-spacing:.06em; color:var(--muted);
    margin-bottom:.5rem}
  .sect > .lbl .req{color:var(--alert)}
  .names{display:flex; flex-wrap:wrap; gap:.4rem}
  .names button{font:inherit; font-size:1rem; cursor:pointer; padding:.55rem .95rem;
    border:1px solid var(--line); background:var(--surface); color:var(--ink);
    border-radius:999px; transition:.12s}
  .names button:hover{border-color:var(--accent)}
  .names button.sel{background:var(--accent); border-color:var(--accent); color:#fff; font-weight:700}
  .names button.add{border-style:dashed; color:var(--muted)}
  .memo{width:100%; font:inherit; font-size:1rem; padding:.7rem .8rem; margin-top:.3rem;
    border:1px solid var(--line); border-radius:6px; background:var(--ground); color:var(--ink)}
  .memo:focus{border-color:var(--accent); outline:none}
  .quick{display:flex; flex-wrap:wrap; gap:.35rem; margin-top:.45rem}
  .quick button{font:inherit; font-size:.82rem; cursor:pointer; padding:.35rem .7rem;
    border:1px solid var(--line); background:var(--surface-2); color:var(--ink-2);
    border-radius:999px; transition:.12s}
  .quick button:hover{border-color:var(--accent); color:var(--accent)}

  /* ── 오늘 남긴 것 ── */
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(105px,1fr)); gap:.55rem}
  .item{background:var(--surface); border:1px solid var(--line); border-radius:6px;
    overflow:hidden; text-align:left; padding:0; font:inherit; cursor:pointer; transition:.12s}
  .item:hover{border-color:var(--accent)}
  /* 사진을 길게 눌렀을 때 브라우저의 이미지 메뉴(공유·복사·추출…)가
     카드 클릭을 가로채지 않게 한다 */
  .item img{width:100%; aspect-ratio:4/3; object-fit:cover; display:block; background:var(--surface-2);
    pointer-events:none; -webkit-touch-callout:none; user-select:none}
  .fit img, .trow img{-webkit-touch-callout:none; user-select:none}
  .item .cap{padding:.4rem .5rem}
  .item .nm{font-size:.85rem; font-weight:700}
  .item .mm{font-size:.74rem; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .stat{display:flex; flex-wrap:wrap; gap:.4rem; margin-bottom:var(--s2)}
  .stat span{font-size:.76rem; color:var(--muted); background:var(--surface-2);
    border-radius:999px; padding:.25rem .6rem; font-variant-numeric:tabular-nums}

  /* ── 🗑 지운 것 ── */
  .trashhead{display:flex; align-items:center}
  .trashtog{font:inherit; font-size:.95rem; font-weight:700; cursor:pointer;
    border:0; background:transparent; color:var(--ink-2); padding:.2rem 0; text-align:left}
  .trashtog:hover{color:var(--accent)}
  .trash{display:flex; flex-direction:column; gap:.5rem; margin-top:var(--s2)}
  .trow{display:flex; align-items:center; gap:.7rem; padding:.6rem;
    border:1px solid var(--line); border-radius:6px; background:var(--surface-2)}
  .trow img{flex:none; width:52px; height:52px; object-fit:cover; border-radius:5px;
    background:var(--line); opacity:.75}
  .tinfo{flex:1; min-width:0}
  .tinfo .nm{font-size:.92rem; font-weight:700}
  .tinfo .mm{font-size:.74rem; color:var(--muted); line-height:1.45}
  .tacts{display:flex; flex-direction:column; gap:.3rem; flex:none}
  .tacts .tbtn{font-size:.78rem; padding:.32rem .6rem; justify-content:center}
  .tbtn.danger{border-color:var(--alert); color:var(--alert); background:transparent}
  .tbtn.danger:hover{background:var(--alert-soft)}
  @media (max-width:400px){
    .trow{flex-wrap:wrap}
    .tacts{flex-direction:row; width:100%}
    .tacts .tbtn{flex:1}
  }

  /* ── 버튼 ── */
  .foot{position:fixed; left:0; right:0; bottom:0; z-index:30; background:var(--surface);
    border-top:1px solid var(--line); box-shadow:0 -4px 16px rgba(0,0,0,.06);
    padding:.7rem var(--s3) calc(.7rem + env(safe-area-inset-bottom))}
  .foot .in{max-width:720px; margin:0 auto; display:flex; gap:.5rem}
  .btn{flex:1; font:inherit; font-size:1rem; font-weight:700; cursor:pointer;
    padding:.9rem .5rem; border:1px solid var(--accent); border-radius:6px;
    background:var(--accent); color:#fff; transition:.12s}
  .btn:hover:not(:disabled){opacity:.9}
  .btn.ghost{background:var(--surface); color:var(--ink-2); border-color:var(--line); flex:0 1 auto; padding:.9rem 1rem}
  .btn.warn{background:var(--alert); border-color:var(--alert)}
  .btn:disabled{opacity:.35; cursor:not-allowed}

  /* ── 알림 ── */
  .note{font-size:.82rem; color:var(--muted); margin-top:.6rem; line-height:1.5}
  .msg{padding:.7rem .9rem; border-radius:6px; font-size:.9rem; line-height:1.55; margin-top:var(--s2)}
  .msg.info{background:var(--accent-soft); border:1px solid var(--accent)}
  .msg.warn{background:var(--alert-soft); border:1px solid var(--alert)}
  .msg.ok{background:var(--ok-soft); border:1px solid var(--ok)}
  /* ── 확인창 ──
     브라우저 기본 confirm 은 버튼 위치를 못 바꾼다.
     같은 자리를 두 번 연타해 실수로 지우는 것을 막으려면 직접 만들어야 한다. */
  .mask{position:fixed; inset:0; z-index:70; background:rgba(20,24,23,.55);
    display:flex; align-items:center; justify-content:center; padding:var(--s3);
    opacity:0; pointer-events:none; transition:opacity .18s}
  .mask.on{opacity:1; pointer-events:auto}
  .dlg{background:var(--surface); border:1px solid var(--line); border-radius:10px;
    box-shadow:0 18px 48px rgba(0,0,0,.28); width:100%; max-width:400px;
    padding:var(--s3); transform:translateY(8px); transition:transform .18s}
  .mask.on .dlg{transform:translateY(0)}
  .dlg h3{font-family:var(--display); font-size:1.2rem; margin:0 0 .5rem; line-height:1.4}
  .dlg .bd{font-size:.94rem; color:var(--ink-2); line-height:1.6; margin-bottom:var(--s3)}
  .dlg .bd b{color:var(--ink)}
  .dlg .warnline{font-size:.8rem; color:var(--alert); font-weight:700; margin-bottom:.5rem;
    letter-spacing:.02em}
  .dlg .acts{display:flex; gap:.5rem}
  .dlg .acts button{flex:1; font:inherit; font-size:.98rem; font-weight:700; cursor:pointer;
    padding:.8rem .5rem; border-radius:6px; border:1px solid var(--line);
    background:var(--surface); color:var(--ink-2); transition:.12s}
  .dlg .acts button:hover{border-color:var(--accent); color:var(--accent)}
  .dlg .acts button.go{background:var(--accent); border-color:var(--accent); color:#fff}
  .dlg .acts button.danger{background:var(--alert); border-color:var(--alert); color:#fff}
  .dlg .acts button.go:hover,.dlg .acts button.danger:hover{opacity:.9; color:#fff}

  /* ── 알림 ──
     하단 버튼을 가리지 않게 위쪽에 둔다. 종류에 따라 색을 달리한다. */
  .notice{position:fixed; left:50%; top:calc(.6rem + env(safe-area-inset-top));
    transform:translateX(-50%) translateY(-140%); z-index:60;
    width:calc(100% - 1.6rem); max-width:640px;
    display:flex; align-items:center; gap:.6rem;
    padding:.7rem .9rem; border-radius:8px; font-size:.92rem; font-weight:700;
    box-shadow:0 6px 20px rgba(0,0,0,.18); transition:transform .22s ease, opacity .22s;
    opacity:0; pointer-events:none}
  .notice.on{transform:translateX(-50%) translateY(0); opacity:1; pointer-events:auto}
  .notice .ic{flex:none; font-size:1.05rem}
  .notice .tx{flex:1; min-width:0; line-height:1.4}
  .notice button{flex:none; font:inherit; font-size:.85rem; font-weight:700; cursor:pointer;
    border:1px solid currentColor; background:transparent; color:inherit;
    border-radius:999px; padding:.3rem .7rem}
  .notice.ok{background:var(--ok-soft); color:var(--ok); border:1px solid var(--ok)}
  .notice.warn{background:var(--alert-soft); color:var(--alert); border:1px solid var(--alert)}
  .notice.info{background:var(--accent-soft); color:var(--accent); border:1px solid var(--accent)}

  .empty{text-align:center; color:var(--muted); padding:var(--s4) var(--s3); font-size:.92rem}

  :focus-visible{outline:2px solid var(--accent); outline-offset:2px}
